<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Radio Asfixiats - En Direct</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #1a1a1a;
            color: #f0f0f0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        header {
            background: #2F3542;
            padding: 20px;
            text-align: center;
            color: white;
            font-size: 1.8rem;
            font-weight: bold;
        }
        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px;
        }
        .player-box {
            background: #222;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.4);
            text-align: center;
        }
        iframe {
            border: none;
            width: 275px;
            height: 365px;
            border-radius: 5px;
            box-shadow: 0px 0px 20px rgba(0,0,0,0.3);
        }
        footer {
            background: #2F3542;
            color: #ddd;
            text-align: center;
            padding: 10px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

<header>
    🎧 Radio Asfixiats – En Direct
</header>

<main>
    <div class="player-box">
        <!-- Ton lecteur RadioKing -->
        <iframe src="https://player.radioking.io/radio-asfixiats/?c=%232F3542&c2=%23ffffff&f=v&i=1&p=1&s=1&alb=1&li=1&popup=1&plc=1&h=365&l=undefined&v=2"></iframe>
        <script type="text/javascript" src="https://player.radioking.io/scripts/iframe.bundle.js"></script>

        <p style="margin-top:15px; color:#ccc;">
            Si le lecteur ne démarre pas, recharge la page.
        </p>
    </div>
</main>

<footer>
    © <span id="year"></span> Radio Asfixiats – Tous droits réservés
</footer>

<script>
    document.getElementById('year').textContent = new Date().getFullYear();
</script>

</body>
</html>
